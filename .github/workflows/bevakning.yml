name: Freerider bevakning

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: freerider
  cancel-in-progress: false

jobs:
  kolla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kor bevakningen
        env:
          # Bevaka strackor mellan tva orter, bada hallen.
          # Gallivare-Umea ligger med som tillfalligt test.
          # Ta bort det nar du sett att notisen kommer fram.
          PAR: "Stockholm-Östersund, Gällivare-Umeå"
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python freerider_check.py

      - name: Spara sedda resor
        run: |
          git config user.name "freerider-bot"
          git config user.email "actions@users.noreply.github.com"
          git add sedda.json 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "Uppdatera sedda resor" && git push)
